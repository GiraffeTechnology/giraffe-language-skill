name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Minimum supported (requires-python = ">=3.11") and latest stable.
        python-version: ["3.11", "3.13"]

    name: py${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Runs before the virtualenv is created so `.` only contains repo sources.
      - name: Byte-compile sources
        run: uv run --no-project --python ${{ matrix.python-version }} python -m compileall .

      - name: Install project (dev extras)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: .venv/bin/ruff check .

      - name: Tests (pytest)
        run: .venv/bin/pytest -q
